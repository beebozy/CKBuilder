<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta http-equiv="X-UA-Compatible" content="IE=edge" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />

    <title>CKB Wallet Dashboard</title>

    <!-- Google Font -->
    <link
      href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap"
      rel="stylesheet"
    />

    <style>
      * {
        margin: 0;
        padding: 0;
        box-sizing: border-box;
      }

      body {
        font-family: "Inter", sans-serif;
        min-height: 100vh;

        display: flex;
        justify-content: center;
        align-items: center;

        background: linear-gradient(
          135deg,
          #0f172a,
          #1e293b,
          #312e81
        );

        color: white;
        overflow-x: hidden;
      }

      /* Animated background glow */
      body::before,
      body::after {
        content: "";
        position: absolute;
        width: 400px;
        height: 400px;
        border-radius: 50%;
        filter: blur(120px);
        z-index: 0;
      }

      body::before {
        background: #6366f1;
        top: -100px;
        left: -100px;
      }

      body::after {
        background: #06b6d4;
        bottom: -100px;
        right: -100px;
      }

      #root {
        position: relative;
        z-index: 1;

        width: 100%;
        max-width: 850px;
        margin: 40px;
        padding: 32px;

        border-radius: 24px;

        background: rgba(255, 255, 255, 0.08);

        backdrop-filter: blur(16px);

        border: 1px solid rgba(255, 255, 255, 0.12);

        box-shadow:
          0 10px 40px rgba(0, 0, 0, 0.3),
          inset 0 1px 1px rgba(255, 255, 255, 0.1);
      }

      h1 {
        font-size: 2rem;
        margin-bottom: 24px;

        background: linear-gradient(to right, #60a5fa, #a78bfa);
        -webkit-background-clip: text;
        -webkit-text-fill-color: transparent;
      }

      input {
        width: 100%;
        margin-top: 8px;
        margin-bottom: 18px;
        padding: 14px 16px;

        border-radius: 12px;
        border: 1px solid rgba(255, 255, 255, 0.15);

        background: rgba(255, 255, 255, 0.06);

        color: white;
        font-size: 15px;

        outline: none;
        transition: all 0.2s ease;
      }

      input:focus {
        border-color: #60a5fa;
        box-shadow: 0 0 0 4px rgba(96, 165, 250, 0.2);
      }

      button {
        margin-top: 16px;
        padding: 14px 22px;

        border: none;
        border-radius: 14px;

        background: linear-gradient(
          135deg,
          #3b82f6,
          #8b5cf6
        );

        color: white;
        font-size: 16px;
        font-weight: 600;

        cursor: pointer;

        transition: all 0.25s ease;
      }

      button:hover {
        transform: translateY(-2px);
        box-shadow: 0 10px 25px rgba(99, 102, 241, 0.4);
      }

      button:disabled {
        opacity: 0.5;
        cursor: not-allowed;
      }

      ul {
        list-style: none;
        margin: 20px 0;
      }

      li {
        margin-bottom: 14px;
        padding: 14px;

        border-radius: 12px;

        background: rgba(255, 255, 255, 0.05);

        border: 1px solid rgba(255, 255, 255, 0.08);
      }

      pre {
        margin-top: 10px;
        padding: 14px;

        overflow-x: auto;

        border-radius: 10px;

        background: rgba(0, 0, 0, 0.35);

        color: #93c5fd;
      }

      small {
        opacity: 0.85;
      }

      a {
        color: #7dd3fc;
      }

      @media (max-width: 768px) {
        #root {
          margin: 16px;
          padding: 22px;
        }

        h1 {
          font-size: 1.6rem;
        }
      }
    </style>
  </head>

  <body>
    <div id="root"></div>

    <script src="index.tsx" type="module"></script>
  </body>
</html>
